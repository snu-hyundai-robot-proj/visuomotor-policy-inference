services:
  inference:
    build: .
    image: visuomotor-policy-inference:latest
    container_name: vpi-inference
    ports:
      - "8000:8000"
    environment:
      - VPI_MODEL_ID=Ngseo/hyundai-uiwang-left-flowmatch
      - VPI_DEVICE=cpu            # set to "cuda" with the GPU block below
      - HF_HOME=/cache/huggingface
      # The model repo is gated (manual approval), so a token with access is required.
      # Put HF_TOKEN in a local .env file (see .env.example) or export it before `up`.
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - hf-cache:/cache/huggingface   # persist the downloaded model across restarts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').getcode()==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s          # first start downloads + loads the model
    restart: unless-stopped

    # --- GPU serving -----------------------------------------------------------
    # Requires the NVIDIA Container Toolkit on the host. Then set VPI_DEVICE=cuda
    # above and uncomment the block below, and run: docker compose up --build
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  hf-cache:
