# Full software stack in one shot:
#   inference (GPU policy server) + frontend (web console) + rosbridge (web<->ROS2).
#
#   docker compose -f docker-compose.full.yml up --build
#
# NOTE: the robot-side ROS2 nodes (HDR35/DG5F drivers, vpi_robot_client, Episode Manager,
# cameras) run on the HOST — they need hardware/device access and the system_Teleop
# workspace. `rosbridge` uses host networking so the browser console reaches those host
# nodes. So this compose = "server + console"; bring the robot nodes up on the host.
name: vpi

services:
  # --- GPU policy inference server (reuses the already-downloaded HF cache) ---
  inference:
    build: .
    image: visuomotor-policy-inference:latest
    container_name: vpi-inference
    ports:
      - "8000:8000"
    environment:
      - VPI_MODEL_ID=${VPI_MODEL_ID:-Ngseo/hyundai-uiwang-left-flowmatch}
      - VPI_DEVICE=cuda
      - HF_HOME=/hf
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}   # 0: allow fetching newer revision files (repo got new files)
    volumes:
      - /home/bi/.cache/huggingface:/hf
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').getcode()==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # --- web console (static; talks to ROS2 via rosbridge) ---
  frontend:
    image: nginx:alpine
    container_name: vpi-frontend
    network_mode: host        # nginx :8080 proxies to localhost 8090/9090/8070 (same-origin)
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # --- web <-> ROS2 bridge (host net so it shares the host ROS2 graph) ---
  rosbridge:
    image: ros:humble-ros-base
    container_name: vpi-rosbridge
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    volumes:
      - /dev/shm:/dev/shm:rw        # share ROS2 DDS shared-memory transport with host/teleop nodes
    command: >
      bash -lc "apt-get update &&
                apt-get install -y --no-install-recommends ros-humble-rosbridge-suite &&
                source /opt/ros/humble/setup.bash &&
                ros2 launch rosbridge_server rosbridge_websocket_launch.xml"
    restart: unless-stopped

  # --- Foxglove bridge: view ROS2 camera topics in Foxglove Studio (ws://host:8765) ---
  foxglove:
    image: ros:humble-ros-base
    container_name: vpi-foxglove
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    volumes:
      - /dev/shm:/dev/shm:rw        # share ROS2 DDS shared-memory transport
    command: >
      bash -lc "apt-get update &&
                apt-get install -y --no-install-recommends ros-humble-foxglove-bridge &&
                source /opt/ros/humble/setup.bash &&
                ros2 launch foxglove_bridge foxglove_bridge_launch.xml port:=8765 address:=0.0.0.0"
    restart: unless-stopped

  # --- MJPEG streams of the camera topics for the web console (port 8090) ---
  # The frontend's <img> tags pull http://<host>:8090/stream?topic=/system_<side>/...
  # Raw Image over rosbridge is too heavy (Zivid ~7MB/frame); web_video_server
  # transcodes to size/quality-capped MJPEG.
  web_video:
    image: ros:humble-ros-base
    container_name: vpi-web-video
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    volumes:
      - /dev/shm:/dev/shm:rw
    command: >
      bash -lc "apt-get update &&
                apt-get install -y --no-install-recommends ros-humble-web-video-server &&
                source /opt/ros/humble/setup.bash &&
                ros2 run web_video_server web_video_server --ros-args -p port:=8090 -p address:=0.0.0.0"
    restart: unless-stopped

  # --- live camera -> inference sanity test (profile-gated; one-shot) ---
  # Subscribes to the system_Teleop vision topics (RealSense wrist + Zivid front),
  # sends them to /predict, prints the 26-d action. Reuses the ros2-teleop image
  # (has rclpy/numpy/requests/PIL) and the host ROS2 graph (domain 0).
  #   run:  docker compose -f docker-compose.full.yml --profile test up camera_infer_test
  camera_infer_test:
    image: ros2-teleop:latest
    container_name: vpi-camera-infer-test
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - PYTHONUNBUFFERED=1
      - SIDE=${SIDE:-right}          # left|right -> derives /system_<SIDE>/{zivid_rgb,d405_rgb}
      - VPI_URL=${VPI_URL:-http://localhost:8000}
      - N_SAMPLES=${N_SAMPLES:-5}
    volumes:
      - ./examples:/vpi_examples:ro
      - /dev/shm:/dev/shm:rw        # share ROS2 DDS shared-memory transport with the vision node
    command: bash -lc "source /opt/ros/humble/setup.bash && python3 /vpi_examples/camera_infer_test.py"
    profiles: ["test"]
    restart: "no"
