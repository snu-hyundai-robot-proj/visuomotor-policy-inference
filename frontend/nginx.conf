# Reverse-proxy everything through this one nginx (port 8080) so the browser only needs
# 8080 — works over tailscale / firewalls where the host-network ports (8090/9090/8070)
# aren't directly reachable. host.docker.internal = the host (set via extra_hosts).
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # MJPEG camera streams -> web_video_server on the host
    location /video/ {
        proxy_pass http://localhost:8090/;
        proxy_http_version 1.1;
        proxy_buffering off;              # push multipart MJPEG frames immediately
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
    }

    # rosbridge websocket -> host:9090
    location /ws {
        proxy_pass http://localhost:9090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # side-switcher -> host:8070
    location /switch/ {
        proxy_pass http://localhost:8070/;
        proxy_read_timeout 300s;
    }

    location / { try_files $uri $uri/ =404; }
}
