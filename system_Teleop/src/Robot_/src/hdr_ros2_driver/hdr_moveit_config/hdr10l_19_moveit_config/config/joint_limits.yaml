    max_velocity: 3.8397299999999993
    has_acceleration_limits: true
    max_acceleration: 12.799
  j4:
    has_velocity_limits: true
    max_velocity: 7.3303800000000002
    has_acceleration_limits: true
    max_acceleration: 36.6519
  j5:
    has_velocity_limits: true
